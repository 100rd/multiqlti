global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape the multiqlti app health endpoint
  - job_name: "multiqlti"
    metrics_path: "/api/health"
    static_configs:
      - targets: ["multiqlti:5000"]
