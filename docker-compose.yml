# ─────────────────────────────────────────────────────────────────────────────
# multiqlti docker-compose -- production-ready
#
# Profiles:
#   full        -- multiqlti + postgres + vllm (GPU) + ollama + caddy
#   cloud-only  -- multiqlti + postgres + caddy (cloud AI providers only)
#   dev         -- multiqlti + postgres + ollama + caddy (CPU-friendly, no GPU)
#   monitoring  -- add Loki + Grafana + Prometheus on top of any profile
#
# Quick start:
#   cp .env.example .env          # fill in your secrets
#   docker compose --profile dev up -d
#
# Production (HTTPS):
#   # Set CADDY_DOMAIN=yourdomain.com in .env
#   docker compose --profile full up -d
#
# See docs/DEPLOYMENT_DOCKER.md for full guide.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: [full, cloud-only, dev]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multiqlti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-multiqlti}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multiqlti}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m
    # Postgres port is NOT exposed to the host -- use docker exec or override file
    # to expose it temporarily for maintenance.

  # ── DB Backup (cron) ────────────────────────────────────────────────────────
  postgres-backup:
    image: postgres:16-alpine
    profiles: [full, cloud-only, dev]
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgbackups:/backups
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    # Run pg_dump every day at 02:00 UTC, keep last 7 dumps
    entrypoint: >
      sh -c "
        while true; do
          sleep_until=\$$(( \$$(date -u +%s) % 86400 ));
          sleep \$$((86400 - sleep_until));
          TIMESTAMP=\$$(date -u +%Y%m%d_%H%M%S);
          pg_dump -h postgres -U ${POSTGRES_USER:-multiqlti} ${POSTGRES_DB:-multiqlti} \
            > /backups/backup_\$$TIMESTAMP.sql;
          ls -t /backups/backup_*.sql | tail -n +8 | xargs rm -f;
          echo \"[backup] Completed at \$$TIMESTAMP\";
        done
      "
    restart: unless-stopped

  # ── Redis (worker queue backing store) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    profiles: [dev, full]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Application ─────────────────────────────────────────────────────────────
  multiqlti:
    build: .
    profiles: [full, cloud-only, dev]
    # No host ports -- traffic arrives through Caddy only
    expose:
      - "5000"
      - "${FEDERATION_PORT:-5001}"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: "${DATABASE_URL:-postgres://multiqlti:${POSTGRES_PASSWORD}@postgres:5432/multiqlti}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      VLLM_ENDPOINT: http://vllm:8000
      OLLAMA_ENDPOINT: http://ollama:11434
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-true}
      SANDBOX_MAX_CONCURRENT: ${SANDBOX_MAX_CONCURRENT:-3}
      SANDBOX_DEFAULT_TIMEOUT: ${SANDBOX_DEFAULT_TIMEOUT:-120}
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      MULTI_FEATURES_WORKER_QUEUE: "${MULTI_FEATURES_WORKER_QUEUE:-false}"
      FEDERATION_ENABLED: "${FEDERATION_ENABLED:-false}"
      FEDERATION_INSTANCE_ID: "${FEDERATION_INSTANCE_ID:-}"
      FEDERATION_INSTANCE_NAME: "${FEDERATION_INSTANCE_NAME:-}"
      FEDERATION_CLUSTER_SECRET: "${FEDERATION_CLUSTER_SECRET:-}"
      FEDERATION_PORT: "${FEDERATION_PORT:-5001}"
      FEDERATION_PEERS: "${FEDERATION_PEERS:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace_data:/app/data/workspaces
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    # Migrations are run by the app on startup via runMigrations()
    command: sh -c "node dist/index.cjs"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/health | grep -q 'status' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Caddy (reverse proxy + automatic TLS) ───────────────────────────────────
  caddy:
    image: caddy:2-alpine
    profiles: [full, cloud-only, dev]
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile.tmpl:ro
      - caddy_data:/data
      - caddy_config:/config
    # Preprocess Caddyfile with envsubst to inject CADDY_DOMAIN, then run caddy
    command: >
      sh -c "apk add --no-cache gettext && envsubst < /etc/caddy/Caddyfile.tmpl > /tmp/Caddyfile && caddy run --config /tmp/Caddyfile --adapter caddyfile"
    networks:
      - internal
    depends_on:
      multiqlti:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── vLLM (GPU required) ─────────────────────────────────────────────────────
  vllm:
    image: vllm/vllm-openai:latest
    profiles: [full]
    # No host ports -- only reachable via internal network
    volumes:
      - vllm_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - "--model"
      - "${VLLM_MODEL:-meta-llama/Meta-Llama-3-70B-Instruct}"
      - "--tensor-parallel-size"
      - "1"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Ollama (CPU-friendly local AI) ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    profiles: [full, dev]
    # No host ports -- only reachable via internal network
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - internal
    restart: unless-stopped

  # ── Loki (log aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    profiles: [monitoring]
    volumes:
      - loki_data:/loki
    networks:
      - internal
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - internal
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    # All services communicate only on this internal bridge.
    # Only Caddy exposes external ports (80 + 443).

volumes:
  pgdata:
  pgbackups:
  redis-data:
  vllm_cache:
  ollama_data:
  workspace_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  loki_data:
  grafana_data:
