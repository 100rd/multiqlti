{{- if .Values.argocd.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ include "multiqlti.fullname" . }}
  namespace: argocd
  labels:
    {{- include "multiqlti.labels" . | nindent 4 }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ .Values.argocd.repoURL }}
    targetRevision: {{ .Values.argocd.targetRevision }}
    path: {{ .Values.argocd.path }}
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: {{ .Values.argocd.server }}
    namespace: {{ .Values.argocd.namespace }}
  {{- with .Values.argocd.syncPolicy }}
  syncPolicy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
