# Development environment values
replicaCount: 1

env:
  NODE_ENV: development
  PORT: "5000"

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: multiqlti.dev.local
      paths:
        - path: /
          pathType: Prefix

postgresql:
  enabled: true
  auth:
    username: multiqlti
    database: multiqlti
  primary:
    persistence:
      size: 5Gi

autoscaling:
  enabled: false
