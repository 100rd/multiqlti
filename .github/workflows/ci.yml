name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Supersede in-progress runs: a newer push to the same PR (github.head_ref) or
# the same branch/tag (github.ref for push events) cancels the older run, so only
# the latest commit for a given head keeps running. De-duplication of the
# push-vs-pull_request pair for one commit is handled by the `guard` job below,
# not here (they resolve to different groups on purpose).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# `gh pr list` in the guard job needs read access to pull requests.
permissions:
  contents: read
  pull-requests: read

jobs:
  # De-duplicate push + pull_request. The pull_request run is authoritative
  # ("green CI = merge arbiter"), so a push run is skipped when the branch has an
  # open PR. push on main always runs (post-merge validation + e2e); pushes to a
  # branch with no PR still run so you get CI before opening the PR.
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"          # PR run is authoritative
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"          # main push: post-merge + e2e
          else
            open=$(gh pr list --repo "${{ github.repository }}" \
              --head "${{ github.ref_name }}" --state open --json number --jq 'length')
            if [ "$open" = "0" ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"         # no PR yet: run push CI
            else
              echo "run=false" >> "$GITHUB_OUTPUT"        # PR exists: PR run covers it
              echo "Skipping push run: branch has an open PR (pull_request run is authoritative)."
            fi
          fi

  lint-typecheck:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: decrypt-confinement (ADR-003 §D3)
        run: bash scripts/check-decrypt-confined.sh

  unit-integration:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --shard=${{ matrix.shard }}/3
      - run: npm run test:coverage
        continue-on-error: true

  helm-validate:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      - name: Build dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build helm/multiqlti
      - name: Lint default values
        run: helm lint helm/multiqlti
      - name: Lint dev values
        run: helm lint helm/multiqlti -f helm/multiqlti/values-dev.yaml
      - name: Lint staging values
        run: helm lint helm/multiqlti -f helm/multiqlti/values-staging.yaml
      - name: Lint prod values
        run: helm lint helm/multiqlti -f helm/multiqlti/values-prod.yaml
      - name: Template render (dev)
        run: helm template multiqlti helm/multiqlti -f helm/multiqlti/values-dev.yaml --set image.repository=test/multiqlti > /dev/null
      - name: Template render (prod)
        run: helm template multiqlti helm/multiqlti -f helm/multiqlti/values-prod.yaml --set image.repository=test/multiqlti > /dev/null

  e2e:
    needs: guard
    runs-on: ubuntu-latest
    if: needs.guard.outputs.run == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        # pgvector/pgvector:pg16, not plain postgres:16 — shared/schema.ts declares
        # a `vector(...)` column (hybrid RAG memory retrieval) and db:push needs
        # the extension's shared library available to resolve that column type.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: multiqlti
          POSTGRES_PASSWORD: multiqlti
          POSTGRES_DB: multiqlti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://multiqlti:multiqlti@localhost:5432/multiqlti_test
      JWT_SECRET: e2e-test-secret-minimum-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Enable pgvector extension
        run: |
          node -e "
            const { Client } = require('pg');
            (async () => {
              const client = new Client({ connectionString: process.env.DATABASE_URL });
              await client.connect();
              await client.query('CREATE EXTENSION IF NOT EXISTS vector');
              await client.end();
            })().catch((err) => { console.error(err); process.exit(1); });
          "
      - run: npm run db:push
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
