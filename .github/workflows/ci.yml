name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  unit-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --shard=${{ matrix.shard }}/3
      - run: npm run test:coverage
        continue-on-error: true

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      - name: Build dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build helm/multiqlti
      - name: Lint default values
        run: helm lint helm/multiqlti
      - name: Lint dev values
        run: helm lint helm/multiqlti -f helm/multiqlti/values-dev.yaml
      - name: Lint staging values
        run: helm lint helm/multiqlti -f helm/multiqlti/values-staging.yaml
      - name: Lint prod values
        run: helm lint helm/multiqlti -f helm/multiqlti/values-prod.yaml
      - name: Template render (dev)
        run: helm template multiqlti helm/multiqlti -f helm/multiqlti/values-dev.yaml --set image.repository=test/multiqlti > /dev/null
      - name: Template render (prod)
        run: helm template multiqlti helm/multiqlti -f helm/multiqlti/values-prod.yaml --set image.repository=test/multiqlti > /dev/null

  e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: multiqlti
          POSTGRES_PASSWORD: multiqlti
          POSTGRES_DB: multiqlti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://multiqlti:multiqlti@localhost:5432/multiqlti_test
      JWT_SECRET: e2e-test-secret-minimum-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:push
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
