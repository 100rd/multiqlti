# multiqlti configuration
# All values here override built-in defaults.
# Environment variables with MULTI_* prefix override this file.
# For secrets, use config.local.yaml (git-ignored) or environment variables.

server:
  port: 5000

pipeline:
  streaming:
    # Idle (no-output) window before a streaming CLI stage is killed. Bumped
    # 60s→120s: slow-first-token CLIs (the `claude` CLI cold start / long
    # pre-output reasoning) tripped the 60s default before emitting a first
    # token, failing the stage with "CLI idle for 60000ms (no output)". The
    # overall wall-clock cap (600s) is unchanged.
    idleTimeoutMs: 120000
  # Consilium Loop — LOCAL dry-run config (do NOT commit; feature ships disabled).
  consiliumLoop:
    enabled: true
    allowedRepoPaths:
      - /Users/lord/Develop/multi-team-agentic/project/Omniscience

features:
  sandbox:
    enabled: false
  privacy:
    enabled: true
